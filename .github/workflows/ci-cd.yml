name: WAV Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: # 👈 ADD THIS: This gives you the "Run Workflow" button in GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 👈 ADD THIS: Built-in GitHub caching for Node/npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 👈 Add here too
      - run: npm ci
      - name: Run ESLint
        run: npx eslint . --max-warnings=0

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 👈 Add here too
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high
